version: 2
updates:
  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: daily
    reviewers:
      - "@getsentry/dev-infra"
      - "@getsentry/security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
    reviewers:
      - "@getsentry/dev-infra"
      - "@getsentry/security"
